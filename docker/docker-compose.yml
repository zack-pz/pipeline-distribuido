services:
  coordinator:
    build:
      context: ..
      dockerfile: docker/coordinator/Dockerfile
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - COORDINATOR_BIND_ADDR=${COORDINATOR_BIND_ADDR:-0.0.0.0:9001}
    ports:
      - "${COORDINATOR_PORT:-9001}:9001"
    networks:
      - pipeline

  edge:
    build:
      context: ..
      dockerfile: docker/edge/Dockerfile
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - EDGE_ID=${EDGE_ID:-edge-1}
      - EDGE_BIND_ADDR=${EDGE_BIND_ADDR:-0.0.0.0:8001}
      - COORDINATOR_ADDR=${COORDINATOR_ADDR:-coordinator:9001}
    depends_on:
      - coordinator
    ports:
      - "${EDGE_PORT:-8001}:8001"
    networks:
      - pipeline

  sensor:
    build:
      context: ..
      dockerfile: docker/sensor/Dockerfile
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SENSOR_ID=${SENSOR_ID:-sensor-1}
      - EDGE_ADDR=${EDGE_ADDR:-edge:8001}
      - INTERVAL_MS=${INTERVAL_MS:-1000}
    depends_on:
      - edge
    networks:
      - pipeline

networks:
  pipeline:
    driver: bridge
